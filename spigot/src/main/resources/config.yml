debug: false

storage:
  type: 'FILE:JSON'
  save-per-change: false
  hostname: '127.0.0.1'
  port: 3306
  database: 'database'
  username: 'username'
  password: 'password'
  properties:
    serverTimezone: 'Europe/London'
    characterEncoding: utf8
    useSSL: true
  pool:
    max-pool-size: 5
    min-idle: 5
    max-lifetime: 1500
    connection-timeout: 8

# false = disable vanilla join/quit message and let DJP handle all output
joinmessage: false
quitmessage: false

# true = only the highest priority rank message is sent
usepriorities: true

# true = rank matching uses the permission node field below
usepermissions: true

vanish-support: true

integrations:
  biteleaderboards:
    enabled: true
    plugin-name: 'BiteLeaderboards'
    playtime-category: 'time_played'
    cache-seconds: 90
    lookup-timeout-ms: 250
    fallback-text: 'N/A'

firstjoin:
  enabled: true
  message:
    - '<gradient:#53d8fb:#38f9d7>Welcome</gradient> &f{player} &7to the server!'

slotforcer:
  enabled: false
  limits:
    - name: 'vip'
      additional: 5
      permission: 'donatorjoin.limit.exceed.vip'
    - name: 'mvp'
      additional: 8
      permission: 'donatorjoin.limit.exceed.mvp'
    - name: 'staff'
      additional: 10
      permission: 'donatorjoin.limit.exceed.staff'

sounds:
  mode: WHITELIST
  list:
    - 'ENTITY_EXPERIENCE_ORB_PICKUP'
    - 'BLOCK_NOTE_BLOCK_BELL'
    - 'ENTITY_PLAYER_LEVELUP'

ranks:
  - name: 'vip'
    permission: 'djp.vip'
    priority: 10
    join:
      enabled: true
      delay: 0
      message:
        text:
          - text: '<gradient:#53d8fb:#38f9d7>JOIN</gradient> &8- '
          - text: '{player_display}'
            hover:
              - '<gradient:#53d8fb:#38f9d7>{player_display}</gradient>'
              - '&8-------------------------'
              - '&7BankPlus: &a%bankplus_balance_formatted%'
              - '&7Vault Balance: &a{player_balance}'
              - '&7Playtime: &b{bite_playtime}'
              - '&7Playtime Rank: &e{bite_playtime_rank} &7/ &f{bite_playtime_total}'
              - '&7First Join: &f{player_first_joined}'
              - '&7Ping: &f{player_ping}ms'
              - '&8-------------------------'
          - text: ' &7joined the server.'
      sound:
        enabled: true
        sound: ENTITY_PLAYER_LEVELUP
        volume: 10
        pitch: 0
      firework: false
      commands:
        enabled: false
        commands: []
    quit:
      enabled: true
      delay: 0
      message:
        text:
          - text: '<gradient:#ff9966:#ff5e62>QUIT</gradient> &8- '
          - text: '{player_display}'
            hover:
              - '<gradient:#ff9966:#ff5e62>{player_display}</gradient>'
              - '&8-------------------------'
              - '&7BankPlus: &a%bankplus_balance_formatted%'
              - '&7Vault Balance: &a{player_balance}'
              - '&7Playtime: &b{bite_playtime}'
              - '&7Playtime Rank: &e{bite_playtime_rank} &7/ &f{bite_playtime_total}'
              - '&7First Join: &f{player_first_joined}'
              - '&7Ping: &f{player_ping}ms'
              - '&8-------------------------'
          - text: ' &7left the server.'
      sound:
        enabled: true
        sound: ENTITY_EXPERIENCE_ORB_PICKUP
        volume: 10
        pitch: 1
      firework: false
      commands:
        enabled: false
        commands: []

  - name: 'mvp'
    permission: 'djp.mvp'
    priority: 20
    join:
      enabled: true
      delay: 0
      message:
        text:
          - text: '<gradient:#c471f5:#fa71cd>MVP JOIN</gradient> &8- '
          - text: '{player_display}'
            hover:
              - '<gradient:#c471f5:#fa71cd>{player_display}</gradient>'
              - '&8-------------------------'
              - '&7BankPlus: &a%bankplus_balance_formatted%'
              - '&7Vault Balance: &a{player_balance}'
              - '&7Playtime: &b{bite_playtime}'
              - '&7Playtime Rank: &e{bite_playtime_rank} &7/ &f{bite_playtime_total}'
              - '&7First Join: &f{player_first_joined}'
              - '&7Ping: &f{player_ping}ms'
              - '&8-------------------------'
          - text: ' &7joined the server.'
      sound:
        enabled: true
        sound: ENTITY_PLAYER_LEVELUP
        volume: 10
        pitch: 1
      firework: true
      commands:
        enabled: false
        commands: []
    quit:
      enabled: true
      delay: 0
      message:
        text:
          - text: '<gradient:#ee0979:#ff6a00>MVP QUIT</gradient> &8- '
          - text: '{player_display}'
            hover:
              - '<gradient:#ee0979:#ff6a00>{player_display}</gradient>'
              - '&8-------------------------'
              - '&7BankPlus: &a%bankplus_balance_formatted%'
              - '&7Vault Balance: &a{player_balance}'
              - '&7Playtime: &b{bite_playtime}'
              - '&7Playtime Rank: &e{bite_playtime_rank} &7/ &f{bite_playtime_total}'
              - '&7First Join: &f{player_first_joined}'
              - '&7Ping: &f{player_ping}ms'
              - '&8-------------------------'
          - text: ' &7left the server.'
      sound:
        enabled: true
        sound: ENTITY_EXPERIENCE_ORB_PICKUP
        volume: 10
        pitch: 1
      firework: false
      commands:
        enabled: false
        commands: []
